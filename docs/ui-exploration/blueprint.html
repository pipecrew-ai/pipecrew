<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pipeline Crew — Blueprint Edition</title>
<style>
  :root {
    --bg:      #0a1628;
    --grid:    rgba(77, 171, 247, 0.06);
    --grid2:   rgba(77, 171, 247, 0.12);
    --line:    #4dabf7;
    --line-d:  #2f6fa0;
    --accent:  #ffffff;
    --text:    #c9e3f5;
    --muted:   #5a789a;
    --surface: rgba(10, 22, 40, 0.6);
  }
  /* Theater theme overrides */
  body.theme-theater {
    --bg:      #1a0710;
    --line:    #ffd166;
    --line-d:  #8b5530;
    --accent:  #fef6e4;
    --text:    #fef6e4;
    --muted:   #a07550;
    --surface: rgba(26, 7, 16, 0.55);
  }
  /* Jobsite theme overrides */
  body.theme-jobsite {
    --bg:      #1a0f05;
    --line:    #f59e0b;
    --line-d:  #92400e;
    --accent:  #fef3c7;
    --text:    #fef3c7;
    --muted:   #a8765a;
    --surface: transparent;
  }
  /* Queue theme overrides */
  body.theme-queue {
    --bg:      #0f0f14;
    --line:    #f5a623;
    --line-d:  #7a5a20;
    --accent:  #fef3c7;
    --text:    #fef3c7;
    --muted:   #8a7a4a;
    --surface: transparent;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'Consolas', 'Cascadia Mono', monospace;
    min-height: 100vh;
    padding: 24px 28px;
    transition: background 0.6s ease;
  }
  body.theme-blueprint {
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px),
      linear-gradient(var(--grid2) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid2) 1px, transparent 1px);
    background-size: 20px 20px, 20px 20px, 100px 100px, 100px 100px;
  }
  body.theme-theater {
    background: radial-gradient(ellipse at 50% 15%, #4a1820 0%, #1a0710 70%);
  }
  body.theme-jobsite {
    background: radial-gradient(ellipse at 50% 30%, #2a1508 0%, #1a0f05 70%);
  }
  body.theme-queue {
    background: linear-gradient(180deg, #1a1a24 0%, #0a0a14 60%, #2a1f10 100%);
  }

  header {
    display: flex;
    align-items: center;
    gap: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--line-d);
    margin-bottom: 28px;
    position: relative;
  }
  header::before, header::after {
    content: '';
    position: absolute;
    width: 10px; height: 10px;
    border: 1px solid var(--line);
    bottom: -5px;
  }
  header::before { left: 0; border-right: none; border-top: none; }
  header::after  { right: 0; border-left: none; border-top: none; }

  .brand-mark {
    width: 40px; height: 40px;
    border: 1.5px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: var(--line);
    position: relative;
  }
  .brand-mark::before, .brand-mark::after {
    content: '';
    position: absolute;
    background: var(--line);
  }
  .brand-mark::before { width: 10px; height: 1px; top: -1px; left: -5px; }
  .brand-mark::after  { width: 1px; height: 10px; top: -5px; left: -1px; }

  h1 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .sub {
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
    letter-spacing: 1.2px;
  }

  .meta {
    margin-left: auto;
    display: flex;
    gap: 28px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }
  .meta b { color: var(--line); }

  .demo-btn {
    padding: 10px 20px;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--line);
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    position: relative;
    transition: all 0.2s;
  }
  .demo-btn::before, .demo-btn::after {
    content: '';
    position: absolute;
    width: 6px; height: 6px;
    border: 1px solid var(--line);
  }
  .demo-btn::before { top: -3px; left: -3px; border-right: none; border-bottom: none; }
  .demo-btn::after  { bottom: -3px; right: -3px; border-left: none; border-top: none; }
  .demo-btn:hover { background: rgba(77, 171, 247, 0.1); box-shadow: 0 0 20px rgba(77, 171, 247, 0.3); }

  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 20px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--line-d);
    padding: 18px 14px 12px;
    position: relative;
    cursor: pointer;
    transition: all 0.25s;
  }
  /* corner brackets */
  .card::before, .card::after {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    border: 1px solid var(--line);
    transition: border-color 0.25s;
  }
  .card::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .card::after  { bottom: -1px; right: -1px; border-left: none; border-top: none; }
  .card .corners-r { position: absolute; top: -1px; right: -1px; width: 12px; height: 12px; border: 1px solid var(--line); border-left: none; border-bottom: none; }
  .card .corners-l { position: absolute; bottom: -1px; left: -1px; width: 12px; height: 12px; border: 1px solid var(--line); border-right: none; border-top: none; }

  .card:hover {
    border-color: var(--line);
    box-shadow: 0 0 24px rgba(77, 171, 247, 0.15);
  }
  .card.selected {
    border-color: var(--accent);
    box-shadow: 0 0 28px rgba(255, 255, 255, 0.2);
  }

  /* header row of each card */
  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 8px;
    margin-bottom: 8px;
    border-bottom: 1px dashed var(--line-d);
    font-size: 9px;
    letter-spacing: 1.2px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .card-head .id { color: var(--line); }
  .card-head .state { color: var(--muted); }
  .card.working .card-head .state { color: #ffb84d; }
  .card.done .card-head .state { color: #4ade80; }

  .card .stage {
    position: relative;
    width: 100%;
    max-width: 140px;
    height: 140px;
    margin: 0 auto;
  }
  .card .stage svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Construction blocks — background behind character, built up during work */
  .blocks-bg .block {
    fill: none;
    stroke: #2f6fa0;
    stroke-width: 1;
    stroke-dasharray: 3 2;
    opacity: 0;
  }
  .blocks-bg .ground-line {
    stroke: #2f6fa0;
    stroke-width: 1;
    stroke-dasharray: 2 3;
    opacity: 0.3;
  }
  .card.working .blocks-bg .block {
    animation: blockDrop 0.5s ease-out forwards;
  }
  .card.working .blocks-bg .block-1 { animation-delay: 0.0s; }
  .card.working .blocks-bg .block-2 { animation-delay: 0.3s; }
  .card.working .blocks-bg .block-3 { animation-delay: 0.6s; }
  .card.working .blocks-bg .block-4 { animation-delay: 0.9s; }
  .card.working .blocks-bg .block-5 { animation-delay: 1.2s; }
  .card.working .blocks-bg .block-6 { animation-delay: 1.5s; }
  .card.working .blocks-bg .block-7 { animation-delay: 1.8s; }
  .card.done .blocks-bg .block {
    opacity: 0.55;
    stroke: #4ade80;
    stroke-dasharray: none;
  }
  @keyframes blockDrop {
    0%   { opacity: 0; transform: translateY(-14px); }
    60%  { opacity: 0.9; transform: translateY(2px); }
    100% { opacity: 0.7; transform: translateY(0); }
  }

  /* ─── THEATER THEME ELEMENTS ─── */
  body.theme-blueprint .theater-bg { display: none; }
  body.theme-theater   .blocks-bg  { display: none; }

  .theater-bg .spotlight { opacity: 0.25; transition: opacity 0.3s; }
  .theater-bg .footlight { opacity: 0.5; }
  .theater-bg .curtain-l, .theater-bg .curtain-r { opacity: 0.9; }
  .theater-bg .stage-edge { fill: #8b5530; }

  body.theme-theater .card.working .theater-bg .spotlight {
    animation: spotlightPulse 1.4s ease-in-out infinite;
  }
  @keyframes spotlightPulse {
    0%, 100% { opacity: 0.2; }
    50%      { opacity: 0.55; }
  }
  body.theme-theater .card.working .theater-bg .footlight {
    animation: footTwinkle 0.8s ease-in-out infinite;
  }
  .theater-bg .footlight-1 { animation-delay: 0s; }
  .theater-bg .footlight-2 { animation-delay: 0.15s; }
  .theater-bg .footlight-3 { animation-delay: 0.3s; }
  .theater-bg .footlight-4 { animation-delay: 0.45s; }
  .theater-bg .footlight-5 { animation-delay: 0.6s; }
  @keyframes footTwinkle {
    0%, 100% { opacity: 0.5; }
    50%      { opacity: 1; }
  }
  body.theme-theater .card.done .theater-bg .spotlight {
    opacity: 0.55;
    fill: #4ade80;
  }
  body.theme-theater .card.done .theater-bg .footlight {
    opacity: 1;
    fill: #4ade80;
  }

  /* ─── JOBSITE THEME ─── */
  .structure-container {
    display: none;
    max-width: 1400px;
    margin: 0 auto 28px;
    padding: 20px 24px 16px;
    border: 1px solid var(--line-d);
    position: relative;
  }
  .structure-container::before, .structure-container::after {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    border: 1px solid var(--line);
  }
  .structure-container::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .structure-container::after  { bottom: -1px; right: -1px; border-left: none; border-top: none; }

  body.theme-jobsite .structure-container { display: block; }

  .structure-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px dashed var(--line-d);
  }
  .structure-header .title { color: var(--line); font-weight: 700; }
  .structure-svg {
    display: block;
    width: 100%;
    max-width: 520px;
    height: 220px;
    margin: 0 auto;
  }
  .structure-block {
    fill: none;
    stroke: var(--line-d);
    stroke-width: 1.5;
    stroke-dasharray: 3 2;
    opacity: 0.25;
    transform-box: fill-box;
    transform-origin: center;
    transition: opacity 0.4s ease;
  }
  .structure-block.working {
    stroke: #ffb84d;
    stroke-dasharray: none;
    animation: structDrop 0.6s ease-out forwards;
    fill: rgba(255, 184, 77, 0.12);
  }
  .structure-block.done {
    stroke: #4ade80;
    stroke-dasharray: none;
    fill: rgba(74, 222, 128, 0.15);
    opacity: 0.85;
  }
  @keyframes structDrop {
    0%   { opacity: 0; transform: translateY(-30px); }
    60%  { opacity: 1; transform: translateY(4px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .structure-label {
    fill: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 7px;
    letter-spacing: 0.5px;
    opacity: 0.5;
  }
  .structure-block.working + .structure-label,
  .structure-block.done + .structure-label { opacity: 1; }
  .structure-ground {
    stroke: var(--line-d);
    stroke-width: 1;
    stroke-dasharray: 2 3;
    fill: none;
  }

  /* In jobsite theme, strip card chrome so characters appear as a crew, not tiles */
  body.theme-jobsite .card {
    background: transparent;
    border: none;
    padding: 8px 4px 6px;
    box-shadow: none;
  }
  body.theme-jobsite .card::before,
  body.theme-jobsite .card::after,
  body.theme-jobsite .card .corners-r,
  body.theme-jobsite .card .corners-l { display: none; }
  body.theme-jobsite .card-head {
    border-bottom: none;
    padding-bottom: 4px;
    margin-bottom: 4px;
  }
  body.theme-jobsite .card-label { border-top: none; padding-top: 4px; }
  body.theme-jobsite .card .blocks-bg,
  body.theme-jobsite .card .theater-bg { display: none; }
  body.theme-jobsite .card:hover { box-shadow: none; }
  body.theme-jobsite .card.selected { box-shadow: 0 0 18px rgba(245, 158, 11, 0.3); }

  /* ─── QUEUE THEME ─── */
  .scene-wrap {
    position: relative;
    max-width: 1400px;
    margin: 0 auto;
  }
  .queue-scene {
    display: none;
    position: relative;
  }
  .queue-scene svg.queue-bg {
    width: 100%;
    height: 440px;
    display: block;
  }
  body.theme-queue .queue-scene { display: block; }
  body.theme-queue .structure-container { display: none; }

  /* In queue theme, the grid becomes an absolute-positioning layer
     that overlays the queue-scene background so characters appear
     IN the scene, not below it. */
  body.theme-queue .grid {
    display: block;
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 440px;
    max-width: 1400px;
    margin: 0;
    pointer-events: none;
  }

  /* Build elements — initially hidden, drop in one at a time as crew works */
  .build-element {
    opacity: 0;
    transform-box: fill-box;
    transform-origin: center bottom;
    transition: opacity 0.4s ease;
  }
  .build-element.visible {
    animation: buildDrop 0.6s ease-out forwards;
  }
  @keyframes buildDrop {
    0%   { opacity: 0; transform: translateY(-25px); }
    60%  { opacity: 1; transform: translateY(3px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  body.theme-queue .queue-scene { pointer-events: none; }
  body.theme-queue .card { pointer-events: auto; }

  body.theme-queue .card {
    position: absolute;
    width: 90px;
    background: transparent;
    border: none;
    padding: 0;
    left: var(--qx, 0);
    top: var(--qy, 180px);
    transition: left 0.9s cubic-bezier(0.4, 0, 0.2, 1),
                top 0.9s cubic-bezier(0.4, 0, 0.2, 1),
                transform 0.9s ease;
    transform: scale(var(--qscale, 1));
    transform-origin: top left;
  }
  body.theme-queue .card::before,
  body.theme-queue .card::after,
  body.theme-queue .card .corners-r,
  body.theme-queue .card .corners-l,
  body.theme-queue .card .card-head,
  body.theme-queue .card .card-specs,
  body.theme-queue .card .blocks-bg,
  body.theme-queue .card .theater-bg { display: none; }
  body.theme-queue .card .stage { max-width: 90px; height: 90px; }
  body.theme-queue .card .card-label {
    border-top: none;
    padding-top: 2px;
    margin-top: 2px;
    justify-content: center;
    font-size: 8px;
  }
  body.theme-queue .card .card-label .tag { display: none; }
  body.theme-queue .card .card-label .name {
    font-size: 9px;
    letter-spacing: 0.8px;
  }

  /* In queue theme: working character stops walking and hammers instead */
  body.theme-queue .card.working svg.char {
    animation: none;
  }
  body.theme-queue .card.working svg.char .arm-l {
    animation: none;
  }
  body.theme-queue .card.working svg.char .arm-r {
    animation: hammerArm 0.45s ease-in-out infinite;
  }
  @keyframes hammerArm {
    0%, 100% { transform: rotate(-70deg); }
    50%      { transform: rotate(25deg); }
  }

  /* Done characters shrink and settle under the building as a finished crew */
  body.theme-queue .card.done {
    --qscale: 0.5;
  }

  /* Hammer impact sparks on the working character */
  body.theme-queue .card.working svg.char::after { content: ''; }

  /* theme switcher */
  .theme-switcher {
    display: flex;
    border: 1px solid var(--line-d);
    padding: 2px;
  }
  .theme-btn {
    padding: 8px 14px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: inherit;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .theme-btn:hover { color: var(--line); }
  .theme-btn.active {
    background: color-mix(in srgb, var(--line) 15%, transparent);
    color: var(--line);
  }

  .card svg.char .stroke-main {
    stroke: var(--line);
    stroke-width: 1.5;
    fill: none;
    stroke-linejoin: miter;
  }
  .card svg.char .stroke-thin {
    stroke: var(--line-d);
    stroke-width: 1;
    fill: none;
    stroke-dasharray: 2 2;
  }
  .card svg.char .dim-label {
    fill: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 6px;
  }
  .card svg.char .construction {
    stroke: var(--line-d);
    stroke-width: 0.8;
    fill: none;
    stroke-dasharray: 1 2;
  }
  .card svg.char .accent-fill {
    fill: var(--line);
    opacity: 0.15;
  }

  /* working pulse — stroke march + slight vertical jump */
  .card.working svg.char .stroke-main {
    stroke: #ffb84d;
    animation: strokeMarch 0.8s linear infinite;
    stroke-dasharray: 4 2;
  }
  @keyframes strokeMarch {
    to { stroke-dashoffset: -12; }
  }
  .card.working svg.char {
    animation: workWalk 1.4s ease-in-out infinite;
  }
  @keyframes workWalk {
    0%   { transform: translateX(-8px) rotate(-1.5deg); }
    50%  { transform: translateX(8px)  rotate(1.5deg); }
    100% { transform: translateX(-8px) rotate(-1.5deg); }
  }

  /* Arm swing — each arm group rotates from the shoulder.
     .arm-l uses right-top as pivot (shoulder is at the top-right of the bbox
     since the arm extends down-and-left). .arm-r is the mirror. */
  svg.char .arm-l {
    transform-box: fill-box;
    transform-origin: right top;
  }
  svg.char .arm-r {
    transform-box: fill-box;
    transform-origin: left top;
  }
  .card.working svg.char .arm-l {
    animation: swingL 1.4s ease-in-out infinite;
  }
  .card.working svg.char .arm-r {
    animation: swingR 1.4s ease-in-out infinite;
  }
  @keyframes swingL {
    0%, 100% { transform: rotate(-22deg); }
    50%      { transform: rotate(18deg); }
  }
  @keyframes swingR {
    0%, 100% { transform: rotate(22deg); }
    50%      { transform: rotate(-18deg); }
  }
  .card.done svg.char .stroke-main {
    stroke: #4ade80;
    filter: drop-shadow(0 0 4px #4ade80);
  }

  .card-label {
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px dashed var(--line-d);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .card-label .name {
    color: var(--accent);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 1.5px;
  }
  .card-label .tag {
    color: var(--muted);
    font-size: 8px;
  }

  .card-specs {
    margin-top: 6px;
    font-size: 8px;
    color: var(--muted);
    letter-spacing: 0.6px;
    display: flex;
    justify-content: space-between;
  }
  .card-specs span b { color: var(--line); font-weight: 700; }

  .footer {
    max-width: 1400px;
    margin: 32px auto 0;
    padding-top: 16px;
    border-top: 1px solid var(--line-d);
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1.2px;
    display: flex;
    justify-content: space-between;
    text-transform: uppercase;
  }
</style>
</head>
<body class="theme-blueprint">

<header>
  <div class="brand-mark">⊞</div>
  <div>
    <h1>Pipeline Crew ⎯ Blueprint Rev 1.0</h1>
    <div class="sub">Technical drawings · 10 agents · engineering schematic</div>
  </div>
  <div class="theme-switcher">
    <button class="theme-btn active" data-theme="blueprint">◈ BLUEPRINT</button>
    <button class="theme-btn" data-theme="theater">🎭 THEATER</button>
    <button class="theme-btn" data-theme="jobsite">🏗️ JOBSITE</button>
    <button class="theme-btn" data-theme="queue">🔨 QUEUE</button>
  </div>
  <div class="meta">
    <div>SHEET <b>01 / 01</b></div>
    <div>SCALE <b>1:1</b></div>
    <div>REV <b>1.0</b></div>
  </div>
  <button class="demo-btn" onclick="runDemo()">▶ RUN PIPELINE</button>
</header>

<section class="structure-container">
  <div class="structure-header">
    <span class="title">◆ SHARED STRUCTURE · PYRAMID-10</span>
    <span>CREW-OWNED · 10 BLOCKS · EACH AGENT CARRIES ONE</span>
  </div>
  <svg class="structure-svg" viewBox="0 0 520 240">
    <!-- ground line -->
    <line class="structure-ground" x1="20" y1="210" x2="500" y2="210"/>
    <line class="structure-ground" x1="20" y1="214" x2="500" y2="214"/>

    <!-- base row (4 blocks) — PO, ARCHITECT, SPEC, BACKEND -->
    <rect id="struct-pip"    class="structure-block" x="110" y="170" width="70" height="36"/>
    <text class="structure-label" x="145" y="193" text-anchor="middle">PIP</text>
    <rect id="struct-archie" class="structure-block" x="182" y="170" width="70" height="36"/>

   and construction marks like a real engineering drawing.
   viewBox: 0 0 160 160
   Origin at (80, 80)

function crosshair(cx, cy) {
  return `
    <line class="construction" x1="${cx-8}" y1="${cy}" x2="${cx+8}" y2="${cy}"/>
    <line class="construction" x1="${cx}" y1="${cy-8}" x2="${cx}" y2="${cy+8}"/>
    <circle cx="${cx}" cy="${cy}" r="1" fill="#4dabf7"/>
  `;
}

function dimLine(x1, y1, x2, y2, label) {
  return `
    <line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#2f6fa0" stroke-width="0.6"/>
    <line x1="${x1-2}" y1="${y1-2}" x2="${x1+2}" y2="${y1+2}" stroke="#2f6fa0" stroke-width="0.6"/>
    <line x1="${x2-2}" y1="${y2-2}" x2="${x2+2}" y2="${y2+2}" stroke="#2f6fa0" stroke-width="0.6"/>

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = CHARS.map(c => `
    <div class="card" id="card-${c.key}" onclick="select('${c.key}')">
      <div class="corners-r"></div>
      <div class="corners-l"></div>
      <div class="card-head">
        <span class="id">◈ ${c.id}</span>
        <span class="state">IDLE</span>
      </div>
      <div class="stage">
        ${BLOCKS_SVG}
        ${THEATER_SVG}
        ${c.svg()}
      </div>
      <div class="card-label">
        <span class="name">${c.name}</span>
        <span class="tag">v${c.version}</span>
      </div>
      <div class="card-specs">
        <span>${c.role.toUpperCase()}</span>
        <span>${c.specs}</span>
      </div>
    </div>
  `).join('');
}

function select(key) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  document.getElementById('card-' + key).classList.add('selected');
}

function setState(key, state) {
  const el = document.getElementById('card-' + key);
  el.classList.remove('working', 'done');
  const stateEl = el.querySelector('.card-head .state');
  if (state === 'working') { el.classList.add('working'); stateEl.textContent = '▶ ACTIVE'; }
  else if (state === 'done') { el.classList.add('done'); stateEl.textContent = '✓ DONE'; }
  else stateEl.textContent = 'IDLE';

  // Jobsite theme: mirror state onto the shared structure block
  const structBlock = document.getElementById('struct-' + key);
  if (structBlock) {
    structBlock.classList.remove('working', 'done');
    if (state) structBlock.classList.add(state);
  }

  // Queue theme: re-layout all characters based on their state
  updateQueueLayout();
}

/* Queue theme layout:
   - "done" characters line up in the wide underground strip below the building
   - the one "working" character stands at the work zone next to the building
   - everyone else lines up to the right in pipeline order waiting their turn
*/
const PIPELINE_ORDER = ['pip','archie','yara','bruno','echo','stratos','mira','pixel','crit','judge'];

function updateQueueLayout() {
  if (!document.body.classList.contains('theme-queue')) return;
  const done = [];
  let working = null;
  const queued = [];

  PIPELINE_ORDER.forEach(key => {
    const el = document.getElementById('card-' + key);
    if (!el) return;
    if (el.classList.contains('done')) done.push(key);
    else if (el.classList.contains('working')) working = key;
    else queued.push(key);
  });

  // done: spread across the widened underground strip
  done.forEach((key, i) => {
    const el = document.getElementById('card-' + key);
    el.style.setProperty('--qx', (60 + i * 85) + 'px');
    el.style.setProperty('--qy', '320px');
  });

  // working: planted at the work zone (right of the building)
  if (working) {
    const el = document.getElementById('card-' + working);
    el.style.setProperty('--qx', '410px');
    el.style.setProperty('--qy', '170px');
  }

  // queued: lined up to the right, in pipeline order
  queued.forEach((key, i) => {
    const el = document.getElementById('card-' + key);
    el.style.setProperty('--qx', (560 + i * 85) + 'px');
    el.style.setProperty('--qy', '170px');
  });

  updateBuildingProgress();
}

/* Building grows as the crew works. For each character that is either
   working OR done, one build element becomes visible. The pipeline order
   drives which element gets built (build-1 through build-10). */
function updateBuildingProgress() {
  let progress = 0;
  PIPELINE_ORDER.forEach(key => {
    const el = document.getElementById('card-' + key);
    if (!el) return;
    if (el.classList.contains('working') || el.classList.contains('done')) {
      progress++;
    }
  });
  for (let i = 1; i <= 10; i++) {
    const block = document.getElementById('build-' + i);
    if (block) {
      block.classList.toggle('visible', i <= progress);
    }
  }
}

async function runDemo() {
  CHARS.forEach(c => setState(c.key, null));
  const seq = ['pip','archie','yara','bruno','echo','stratos','mira','pixel','crit','judge'];
  for (const key of seq) {
    setState(key, 'working');
    await new Promise(r => setTimeout(r, 700));
    setState(key, 'done');
    await new Promise(r => setTimeout(r, 200));
  }
}

// theme switcher
document.querySelectorAll('.theme-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const theme = btn.dataset.theme;
    document.body.className = 'theme-' + theme;
    document.querySelectorAll('.theme-btn').forEach(b => {
      b.classList.toggle('active', b === btn);
    });
    // apply queue positions immediately when switching into queue theme
    if (theme === 'queue') {
      // defer one frame so class is applied before layout fn runs
      requestAnimationFrame(updateQueueLayout);
    }
  });
});

render();
</script>
