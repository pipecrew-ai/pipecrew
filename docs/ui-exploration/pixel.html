<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pipeline Crew — Pixel Edition</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a2e;
    color: #e6edf3;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    padding: 28px;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  header {
    display: flex;
    align-items: center;
    gap: 20px;
    padding-bottom: 24px;
    border-bottom: 2px dashed rgba(255,255,255,0.15);
    margin-bottom: 28px;
  }
  h1 { font-size: 20px; letter-spacing: 2px; }
  .sub { font-size: 11px; opacity: 0.6; margin-top: 2px; }
  .demo-btn {
    margin-left: auto;
    padding: 10px 18px;
    background: #f5a623;
    border: 3px solid #000;
    color: #000;
    font-family: inherit;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: 4px 4px 0 #000;
  }
  .demo-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #000; }

  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .card {
    background: #16162a;
    border: 3px solid #2a2a3a;
    padding: 16px 12px;
    text-align: center;
    cursor: pointer;
    position: relative;
  }
  .card:hover { border-color: var(--c); }
  .card.selected { border-color: var(--c); box-shadow: 0 0 0 3px rgba(255,255,255,0.3); }
  .card svg { width: 96px; height: 96px; display: block; margin: 0 auto 10px; }
  .card.working svg { animation: wiggle 0.3s steps(2) infinite; }
  .card.done svg { animation: jump 0.5s steps(4) 2; }
  @keyframes wiggle {
    0% { transform: translateX(0); }
    50% { transform: translateX(-2px); }
    100% { transform: translateX(2px); }
  }
  @keyframes jump {
    0% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0); }
  }
  .name { font-size: 12px; letter-spacing: 1.5px; font-weight: 700; }
  .role { font-size: 9px; opacity: 0.6; margin-top: 3px; letter-spacing: 0.5px; }
  .status {
    position: absolute;
    top: 8px; right: 8px;
    width: 10px; height: 10px;
    background: #555;
    border: 2px solid #000;
  }
  .card.working .status { background: #f5a623; animation: blink 0.4s steps(2) infinite; }
  .card.done .status { background: #22c55e; }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>
<header>
  <div>
    <h1>▶ PIPELINE CREW — PIXEL EDITION</h1>
    <div class="sub">8-bit sprites hand-coded as SVG pixel grids. No sprite sheets, no deps.</div>
  </div>
  <button class="demo-btn" onclick="runDemo()">▶ RUN DEMO</button>
</header>

<div class="grid" id="grid"></div>

function renderSprite(char) {
  const rows = char.sprite;
  const w = rows[0].length;
  const h = rows.length;
  let rects = '';
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const ch = rows[y][x];
      if (ch === '.') continue;
      const color = char.palette[ch] || '#f0f';
      rects += `<rect x="${x * PX}" y="${y * PX}" width="${PX}" height="${PX}" fill="${color}"/>`;
    }
  }
  return `<svg viewBox="0 0 ${w*PX} ${h*PX}" shape-rendering="crispEdges">${rects}</svg>`;
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = CHARS.map(c => `
    <div class="card" id="card-${c.id}" style="--c: ${c.color}" onclick="select('${c.id}')">
      <div class="status"></div>
      ${renderSprite(c)}
      <div class="name" style="color:${c.color}">${c.name}</div>
      <div class="role">${c.role}</div>
    </div>
  `).join('');
}

function select(id) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  document.getElementById('card-' + id).classList.add('selected');
}

function setState(id, state) {
  const el = document.getElementById('card-' + id);
  el.classList.remove('working', 'done');
  if (state) el.classList.add(state);
}

async function runDemo() {
  CHARS.forEach(c => setState(c.id, null));
  const seq = ['pip','archie','yara','bruno','echo','stratos','mira','pixel','crit','judge'];
  for (const id of seq) {
    setState(id, 'working');
    await new Promise(r => setTimeout(r, 600));
    setState(id, 'done');
    await new Promise(r => setTimeout(r, 150));
  }
}

render();
