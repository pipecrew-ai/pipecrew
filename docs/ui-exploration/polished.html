<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pipeline Crew — Landscape Edition</title>
<style>
  :root {
    --pip:     #F5A623;
    --archie:  #3B82F6;
    --yara:    #10B981;
    --bruno:   #D97706;
    --pixel:   #8B5CF6;
    --mira:    #EC4899;
    --echo:    #22C55E;
    --stratos: #06B6D4;
    --crit:    #EF4444;
    --judge:   #7C3AED;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #fff;
    transition: background 0.8s ease;
  }

  body.scene-office    { background: linear-gradient(180deg, #2a2d3a 0%, #1a1d28 100%); }
  body.scene-park      { background: linear-gradient(180deg, #7dc8f0 0%, #fde68a 100%); }
  body.scene-site      { background: linear-gradient(180deg, #5a4330 0%, #8b6543 100%); }
  body.scene-orchestra { background: linear-gradient(180deg, #1a0a1a 0%, #2a0f1a 100%); }

  /* ─────── HEADER ─────── */
  header {
    padding: 18px 28px;
    display: flex;
    align-items: center;
    gap: 20px;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    z-index: 10;
    position: relative;
  }
  header .brand h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.3px; }
  header .brand p  { font-size: 11px; opacity: 0.7; margin-top: 2px; }

  .scene-switcher {
    margin-left: auto;
    display: flex;
    gap: 6px;
    padding: 4px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
  }
  .scene-btn {
    padding: 8px 16px;
    background: transparent;
    border: none;
    color: #fff;
    border-radius: 9px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.2s;
    opacity: 0.6;
  }
  .scene-btn:hover { opacity: 1; background: rgba(255,255,255,0.08); }
  .scene-btn.active {
    background: rgba(255,255,255,0.18);
    opacity: 1;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.25);
  }

  /* ─────── MAIN ─────── */
  main {
    display: grid;
    grid-template-columns: 1fr 340px;
    height: calc(100vh - 65px);
  }

  .stage {
    position: relative;
    overflow: hidden;
  }
  .stage svg { width: 100%; height: 100%; display: block; }

  /* ─────── CHARACTER STYLES ─────── */
  .character {
    cursor: pointer;
    transform-origin: center bottom;
    transition: filter 0.3s;
  }
  .character:hover .char-body { filter: brightness(1.15); }
  .character.selected .selection-ring { opacity: 1; }
  .selection-ring {
    opacity: 0;
    transition: opacity 0.3s;
  }

  /* name label */
  .char-label {
    font-size: 9px;
    font-weight: 700;
    text-anchor: middle;
    fill: #fff;
    paint-order: stroke;
    stroke: rgba(0,0,0,0.7);
    stroke-width: 2.5px;
    stroke-linejoin: round;
    pointer-events: none;
  }

  /* status dot above character */
  .char-status {
    opacity: 0;
    transition: opacity 0.3s;
  }
  .character.working .char-status,
  .character.done .char-status,
  .character.blocked .char-status { opacity: 1; }

  /* idle bob */
  .char-body {
    animation: bob 3s ease-in-out infinite;
    transform-origin: center bottom;
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-3px); }
  }

  /* working state — shake + scene fx */
  .character.working .char-body {
    animation: workBob 0.5s ease-in-out infinite;
  }
  @keyframes workBob {
    0%, 100% { transform: translateY(0) rotate(0); }
    25%      { transform: translateY(-1px) rotate(-1.5deg); }
    75%      { transform: translateY(-2px) rotate(1.5deg); }
  }

  /* done state */
  .character.done .char-body {
    animation: celebrate 0.8s ease-out 2;
  }
  @keyframes celebrate {
    0%   { transform: translateY(0) scale(1); }
    30%  { transform: translateY(-14px) scale(1.08); }
    60%  { transform: translateY(0) scale(1); }
    100% { transform: translateY(0) scale(1); }
  }

  /* blocked state */
  .character.blocked .char-body {
    animation: shake 0.3s ease-in-out infinite;
    filter: grayscale(0.5);
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25%      { transform: translateX(-2px) rotate(-2deg); }
    75%      { transform: translateX(2px) rotate(2deg); }
  }

  /* work particles */
  .work-fx { opacity: 0; }
  .character.working .work-fx {
    opacity: 1;
    animation: fxRise 1.5s ease-out infinite;
  }
  @keyframes fxRise {
    0%   { transform: translateY(0); opacity: 0; }
    20%  { opacity: 1; }
    100% { transform: translateY(-30px); opacity: 0; }
  }

  /* scene prop animations */
  .scene-prop-anim { transform-origin: center; }
  .anim-sway { animation: sway 4s ease-in-out infinite; transform-origin: bottom center; }
  @keyframes sway {
    0%, 100% { transform: rotate(-2deg); }
    50%      { transform: rotate(2deg); }
  }

  .anim-float { animation: float 5s ease-in-out infinite; }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }

  .anim-spin { animation: spin 8s linear infinite; transform-origin: center; transform-box: fill-box; }
  @keyframes spin {
    from { transform: rotate(0); }
    to   { transform: rotate(360deg); }
  }

  .cloud { animation: drift 30s linear infinite; }
  @keyframes drift {
    0%   { transform: translateX(0); }
    100% { transform: translateX(40px); }
  }

  .duck-bob { animation: duckBob 2s ease-in-out infinite; transform-origin: center; }
  @keyframes duckBob {
    0%, 100% { transform: translateY(0) rotate(0); }
    50%      { transform: translateY(-2px) rotate(3deg); }
  }

  .sparkle { animation: sparkle 1s ease-in-out infinite; transform-origin: center; }
  @keyframes sparkle {
    0%, 100% { opacity: 0.4; transform: scale(0.8); }
    50%      { opacity: 1; transform: scale(1.2); }
  }

  /* ─────── SIDE PANEL ─────── */
  aside {
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(18px);
    border-left: 1px solid rgba(255,255,255,0.12);
    padding: 22px 22px 22px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .demo-btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #F5A623, #D97706);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 14px -4px rgba(245,166,35,0.6);
  }
  .demo-btn:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.08); }
  .demo-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .secondary-btn {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    background: rgba(255,255,255,0.08);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .secondary-btn:hover { background: rgba(255,255,255,0.15); }

  /* ─────── FEEDBACK BUBBLE ─────── */
  .feedback-bubble {
    opacity: 0;
    cursor: pointer;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .character.needs-feedback .feedback-bubble {
    opacity: 1;
    pointer-events: all;
    animation: bubbleFloat 1.2s ease-in-out infinite;
  }
  @keyframes bubbleFloat {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-4px); }
  }
  .character.needs-feedback .char-body {
    animation: askBob 0.8s ease-in-out infinite;
  }
  @keyframes askBob {
    0%, 100% { transform: translateY(0) rotate(0); }
    50%      { transform: translateY(-3px) rotate(-2deg); }
  }

  /* header flash when someone needs feedback */
  header.needs-attention {
    animation: headerFlash 1s ease-in-out 3;
  }
  @keyframes headerFlash {
    0%, 100% { box-shadow: 0 0 0 0 rgba(245, 166, 35, 0); }
    50%      { box-shadow: inset 0 -3px 0 0 rgba(245, 166, 35, 0.8), 0 8px 24px -4px rgba(245, 166, 35, 0.5); }
  }

  .panel-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    opacity: 0.55;
    margin: 20px 0 10px;
  }

  .panel-empty {
    font-size: 12px;
    opacity: 0.45;
    padding: 16px;
    text-align: center;
    background: rgba(255,255,255,0.03);
    border-radius: 10px;
    border: 1px dashed rgba(255,255,255,0.1);
  }

  #detail { flex-shrink: 0; }
  #detail.visible { display: block; }
  #detail:not(.visible) { display: none; }

  .detail-head {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .detail-avatar {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .detail-avatar svg { width: 44px; height: 44px; }
  .detail-name { font-size: 18px; font-weight: 700; }
  .detail-role {
    display: inline-block;
    padding: 2px 10px;
    background: var(--c);
    color: #fff;
    font-size: 10px;
    font-weight: 600;
    border-radius: 8px;
    margin-top: 3px;
  }
  .detail-desc {
    font-size: 12px;
    line-height: 1.55;
    opacity: 0.85;
    margin: 10px 0;
  }
  .detail-quote {
    font-size: 11px;
    font-style: italic;
    padding: 10px 12px;
    background: rgba(255,255,255,0.05);
    border-left: 3px solid var(--c);
    border-radius: 4px;
    margin: 10px 0;
    opacity: 0.85;
  }
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 12px;
  }
  .stat {
    padding: 8px 10px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
  }
  .stat b { display: block; font-size: 15px; font-weight: 700; }
  .stat span { font-size: 10px; opacity: 0.65; text-transform: uppercase; letter-spacing: 0.8px; }

  /* feed */
  #feed {
    flex: 1;
    overflow-y: auto;
    max-height: 200px;
    display: flex;
    flex-direction: column-reverse;
  }
  .feed-line {
    font-size: 11px;
    font-family: 'Consolas', 'Cascadia Mono', monospace;
    padding: 6px 10px;
    margin-bottom: 4px;
    background: rgba(255,255,255,0.03);
    border-left: 2px solid var(--lc, rgba(255,255,255,0.15));
    border-radius: 4px;
    opacity: 0;
    animation: feedIn 0.4s forwards;
  }
  @keyframes feedIn {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* scrollbar */
  aside::-webkit-scrollbar, #feed::-webkit-scrollbar { width: 6px; }
  aside::-webkit-scrollbar-thumb, #feed::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
</style>
</head>
<body class="scene-office">

<header>
  <div class="brand">
    <h1>🎨 Pipeline Crew — Landscape Edition</h1>
    <p>Pick a scene. Watch your agents work where they belong.</p>
  </div>
  <div class="scene-switcher">
    <button class="scene-btn active" data-scene="office">🏢 Office</button>
    <button class="scene-btn" data-scene="park">🌳 Park</button>
    <button class="scene-btn" data-scene="site">🏗️ Site</button>
    <button class="scene-btn" data-scene="orchestra">🎼 Orchestra</button>
  </div>
</header>

<main>
  <div class="stage">
    <svg id="stage-svg" viewBox="0 0 1400 780" preserveAspectRatio="xMidYMid slice">
      <!-- scene injected here -->
    </svg>
  </div>

  <aside>
    <button class="demo-btn" id="demoBtn" onclick="runDemo()">▶ Run Demo Pipeline</button>
    <button class="secondary-btn" onclick="simulateFeedback()">💬 Simulate Feedback Request</button>

    <div class="panel-title">Selected Agent</div>
    <div id="detail-empty" class="panel-empty">Click a character in the scene to see details.</div>
    <div id="detail" style="--c: #F5A623;">
      <div class="detail-head">
        <div class="detail-avatar" id="detail-avatar"></div>
        <div>
          <div class="detail-name" id="detail-name"></div>
          <div class="detail-role" id="detail-role"></div>
        </div>
      </div>
      <div class="detail-desc" id="detail-desc"></div>
      <div class="detail-quote" id="detail-quote"></div>
      <div class="stats" id="detail-stats"></div>
    </div>

    <div class="panel-title">Live Feed</div>
    <div id="feed">
      <div class="feed-line" style="--lc: #8b949e">System ready. Select a scene and run the demo.</div>
    </div>
  </aside>
</main>

<script>
/* ════════════════════════════════════════════════════════════
   CHARACTER DEFINITIONS
   Each character is a function that returns SVG body content.
   The character is placed at (0,0) and sized ~60px tall.
   ════════════════════════════════════════════════════════════ */

const CHARS = {

    name: 'Pip', role: 'Product Owner', color: '#F5A623', skin: '#FFD4A3',
    desc: 'Transforms vague feature ideas into crystal-clear requirements. Always curious, always asking WHY.',
    quote: '"What does the user ACTUALLY need here? Let me ask three more questions."',
    stats: [['12','Features'],['4.2','Avg Qs'],['98%','Clarity'],['0','Reworks']],
    body: (c, skin) => `
      <ellipse cx="0" cy="2" rx="14" ry="3" fill="rgba(0,0,0,0.25)"/>
      <rect x="-8" y="-8" width="6" height="10" rx="2" fill="#3a2718"/>
      <rect x="2" y="-8" width="6" height="10" rx="2" fill="#3a2718"/>
      <rect x="-11" y="-22" width="22" height="18" rx="5" fill="${c}"/>
      <rect x="-13" y="-20" width="4" height="14" rx="2" fill="${skin}"/>
      <rect x="9" y="-20" width="4" height="14" rx="2" fill="${skin}"/>
      <circle cx="0" cy="-32" r="11" fill="${skin}"/>
      <ellipse cx="0" cy="-40" rx="13" ry="4" fill="${c}"/>
      <circle cx="7" cy="-43" r="2" fill="${c}"/>
      <circle cx="-3.5" cy="-32" r="1.3" fill="#2a1f12"/>
      <circle cx="3.5" cy="-32" r="1.3" fill="#2a1f12"/>
      <circle cx="-6" cy="-29" r="1.5" fill="#FFB4B4" opacity="0.7"/>
      <circle cx="6" cy="-29" r="1.5" fill="#FFB4B4" opacity="0.7"/>
      <path d="M-3 -26 Q0 -24 3 -26" stroke="#2a1f12" fill="none" stroke-width="1.3" stroke-linecap="round"/>
    `,
    fx: (c) => `<text x="18" y="-30" font-size="11" fill="${c}">?</text>`
  },

  archie: {
    name: 'Archie', role: 'Solution Architect', color: '#3B82F6', skin: '#FFD4A3',
    desc: 'Sees the whole system at once. Draws service boundaries, writes ADRs, ensures the crew never re-litigates solved problems.',
    quote: '"We already ruled out Lambda in ADR-002. SQS direct it is."',
    stats: [['8','Designs'],['14','ADRs'],['72K','Avg Tokens'],['0','Reworks']],
    body: (c, skin) => `
      <ellipse cx="0" cy="2" rx="14" ry="3" fill="rgba(0,0,0,0.25)"/>
      <rect x="-8" y="-8" width="6" height="10" rx="2" fill="#1e3a5f"/>
      <rect x="2" y="-8" width="6" height="10" rx="2" fill="#1e3a5f"/>
      <rect x="-11" y="-22" width="22" height="18" rx="5" fill="${c}"/>
      <path d="M-11 -20 L11 -20 L0 -10 Z" fill="#fff" opacity="0.25"/>
      <rect x="-13" y="-20" width="4" height="14" rx="2" fill="${skin}"/>
      <rect x="9" y="-20" width="4" height="14" rx="2" fill="${skin}"/>
      <circle cx="0" cy="-32" r="11" fill="${skin}"/>
      <path d="M-10 -42 Q0 -46 10 -42 L10 -38 Q0 -40 -10 -38 Z" fill="#2a1f12"/>
      <rect x="-6" y="-34" width="4" height="3" rx="0.5" fill="none" stroke="#2a1f12" stroke-width="1.2"/>
      <rect x="2" y="-34" width="4" height="3" rx="0.5" fill="none" stroke="#2a1f12" stroke-width="1.2"/>
      <line x1="-2" y1="-32.5" x2="2" y2="-32.5" stroke="#2a1f12" stroke-width="1.2"/>
      <path d="M-3 -26 L3 -26" stroke="#2a1f12" stroke-width="1.3" stroke-linecap="round"/>
    `,
    fx: (c) => `<rect x="14" y="-38" width="10" height="12" rx="1" fill="${c}" opacity="0.8"/><line x1="16" y1="-34" x2="22" y2="-34" stroke="#fff" stroke-width="0.7"/><line x1="16" y1="-32" x2="22" y2="-32" stroke="#fff" stroke-width="0.7"/><line x1="16" y1="-30" x2="22" y2="-30" stroke="#fff" stroke-width="0.7"/>`
  },

  yara: {
    name: 'Yara', role: 'Spec Editor', color: '#10B981', skin: '#E8B888',
    desc: 'Keeper of the contract. Every endpoint, every schema — edited with surgical precision. Nothing leaves her hands without YAML validation.',
    quote: '"Indentation drift detected on line 847. Fixed."',
    stats: [['34','Specs'],['0','YAML Errors'],['2m 10s','Duration'],['1','Rollback']],

      <rect x="-8" y="-8" width="6" height="10" rx="2" fill="#2d3748"/>

      <rect x="-12" y="-24" width="24" height="20" rx="5" fill="#fff"/>

      <rect x="10" y="-20" width="4" height="14" rx="2" fill="${skin}"/>

    `,

  bruno: {

      <rect x="-15" y="-22" width="5" height="16" rx="2.5" fill="${skin}"/>
      <rect x="10" y="-22" width="5" height="16" rx="2.5" fill="${skin}"/>
      <circle cx="0" cy="-33" r="12" fill="${skin}"/>
      <path d="M-13 -38 Q-14 -46 0 -47 Q14 -46 13 -38 Z" fill="${c}"/>
      <rect x="-14" y="-40" width="28" height="5" rx="1" fill="#fff" opacity="0.3"/>
      <circle cx="-4" cy="-33" r="1.4" fill="#2a1f12"/>
      <circle cx="4" cy="-33" r="1.4" fill="#2a1f12"/>
      <path d="M-3 -27 L3 -27" stroke="#2a1f12" stroke-width="1.5" stroke-linecap="round"/>
    `,
    fx: (c) => `<circle class="sparkle" cx="18" cy="-32" r="2" fill="#fff"/><circle class="sparkle" cx="22" cy="-36" r="1.5" fill="${c}" style="animation-delay:0.3s"/><circle class="sparkle" cx="15" cy="-38" r="1.5" fill="#fff" style="animation-delay:0.6s"/>`
  },

  pixel: {
    name: 'Pixel', role: 'Frontend Implementer', color: '#8B5CF6', skin: '#FFD4A3',
    desc: 'Pure creative energy, disciplined. Every type matches the spec. Every string has an AR key. Every layout works in RTL.',
    quote: '"Types first, always. The spec says attachmentType, not kind."',
    stats: [['0','Type Errors'],['EN+AR','i18n'],['✓','RTL'],['12m','Duration']],
    body: (c, skin) => `
      <ellipse cx="0" cy="2" rx="14" ry="3" fill="rgba(0,0,0,0.25)"/>
      <rect x="-8" y="-8" width="6" height="10" rx="2" fill="#312e81"/>
      <rect x="2" y="-8" width="6" height="10" rx="2" fill="#312e81"/>
      <rect x="-11" y="-22" width="22" height="18" rx="5" fill="${c}"/>

/* ════════════════════════════════════════════════════════════
   CHARACTER SELECTION + DETAILS
   ════════════════════════════════════════════════════════════ */
function selectChar(id) {
  document.querySelectorAll('.character').forEach(c => c.classList.remove('selected'));
  document.getElementById('char-' + id).classList.add('selected');

  const char = CHARS[id];
  const detail = document.getElementById('detail');
  document.getElementById('detail-empty').style.display = 'none';
  detail.classList.add('visible');
  detail.style.setProperty('--c', char.color);

  // avatar: render a small version
  document.getElementById('detail-avatar').innerHTML =
    `<svg viewBox="-22 -50 44 60">${char.body(char.color, char.skin)}</svg>`;
  document.getElementById('detail-name').textContent = char.name;
  document.getElementById('detail-role').textContent = char.role;
  document.getElementById('detail-desc').textContent = char.desc;
  document.getElementById('detail-quote').textContent = char.quote;
  document.getElementById('detail-stats').innerHTML =
    char.stats.map(([v, l]) => `<div class="stat"><b>${v}</b><span>${l}</span></div>`).join('');
}

/* ════════════════════════════════════════════════════════════
   STATE CONTROL
   ════════════════════════════════════════════════════════════ */
function setState(id, state) {
  const el = document.getElementById('char-' + id);
  if (!el) return;
  el.classList.remove('working', 'done', 'blocked', 'needs-feedback');
  if (state) el.classList.add(state);
}

function resetStates() {
  Object.keys(CHARS).forEach(id => setState(id, null));
}

/* ════════════════════════════════════════════════════════════
   FEEDBACK REQUEST MECHANISM
   When an agent hits an approval gate or needs input, it enters
   the 'needs-feedback' state and shows a speech bubble. Clicking
   the bubble acknowledges and resumes the agent.
   ════════════════════════════════════════════════════════════ */
function requestFeedback(id, context) {
  const el = document.getElementById('char-' + id);
  if (!el) return;
  el.classList.remove('working', 'done', 'blocked');
  el.classList.add('needs-feedback');

  // flash the header
  const header = document.querySelector('header');
  header.classList.remove('needs-attention');
  void header.offsetWidth; // force reflow
  header.classList.add('needs-attention');

  addFeed(`⚠ ${CHARS[id].name} needs your feedback — ${context || 'click the bubble'}`, CHARS[id].color);

  // Try a subtle beep via WebAudio
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.frequency.value = 660;
    gain.gain.value = 0.08;
    osc.connect(gain).connect(ctx.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.stop(ctx.currentTime + 0.3);
  } catch (e) { /* audio blocked — silent */ }
}

function respondToFeedback(id) {
  const el = document.getElementById('char-' + id);
  if (!el || !el.classList.contains('needs-feedback')) return;
  el.classList.remove('needs-feedback');
  el.classList.add('working');
  addFeed(`✓ You responded to ${CHARS[id].name}. Resuming...`, '#22C55E');

  // after a moment, transition to done
  setTimeout(() => {
    if (el.classList.contains('working')) {
      el.classList.remove('working');
      el.classList.add('done');
      addFeed(`${CHARS[id].name}: thanks! continuing ✓`, CHARS[id].color);
    }
  }, 1500);
}

function simulateFeedback() {
  // pick a random character that isn't in feedback state
  const candidates = Object.keys(CHARS).filter(id => {
    const el = document.getElementById('char-' + id);
    return el && !el.classList.contains('needs-feedback');
  });
  if (candidates.length === 0) return;
  const pick = candidates[Math.floor(Math.random() * candidates.length)];
  const contexts = [
    'choose between two design options',
    'approve requirements draft',
    'confirm spec changes',
    'review findings',
    'unblock ambiguous ACL rule',
    'pick naming for new field',
  ];
  const ctx = contexts[Math.floor(Math.random() * contexts.length)];
  requestFeedback(pick, ctx);
}

/* ════════════════════════════════════════════════════════════
   LIVE FEED
   ════════════════════════════════════════════════════════════ */
function addFeed(message, color) {
  const feed = document.getElementById('feed');
  const line = document.createElement('div');
  line.className = 'feed-line';
  line.style.setProperty('--lc', color || 'rgba(255,255,255,0.2)');
  line.textContent = message;
  feed.prepend(line);
  // cap at 30 lines
  while (feed.children.length > 30) feed.removeChild(feed.lastChild);
}

function waitForFeedbackResponse(id) {
  return new Promise(resolve => {
    const el = document.getElementById('char-' + id);
    const check = () => {
      if (!el.classList.contains('needs-feedback')) {
        resolve();
      } else {
        setTimeout(check, 120);
      }
    };
    check();
  });
}

async function runDemo() {
  const btn = document.getElementById('demoBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Pipeline Running...';
  resetStates();
  addFeed('─── Pipeline started ───', '#F5A623');

  for (const step of DEMO_STEPS) {
    await new Promise(r => setTimeout(r, step.d));
    if (step.s === 'feedback') {
      requestFeedback(step.c, step.m);
      btn.textContent = '⏸ Waiting for your feedback...';
      await waitForFeedbackResponse(step.c);
      btn.textContent = '⏳ Pipeline Running...';
      continue;
    }
    setState(step.c, step.s);
    addFeed(step.m, CHARS[step.c].color);
  }

  await new Promise(r => setTimeout(r, 1500));
  addFeed('─── Pipeline complete ───', '#22C55E');
  btn.disabled = false;
  btn.textContent = '▶ Run Demo Pipeline';
}
