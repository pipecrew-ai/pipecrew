<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pipeline Crew — Three.js Edition</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #0a0d15;
    color: #e6edf3;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  header {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 18px 28px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  h1 { font-size: 20px; }
  .sub { font-size: 11px; opacity: 0.6; margin-top: 2px; }
  .demo-btn {
    margin-left: auto;
    padding: 10px 18px;
    background: linear-gradient(135deg, #F5A623, #D97706);
    border: none;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    border-radius: 10px;
    cursor: pointer;
  }

  #stage { width: 100vw; height: 100vh; display: block; }

  .panel {
    position: absolute;
    bottom: 20px;
    right: 20px;
    width: 280px;
    padding: 16px;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    display: none;
  }
  .panel.visible { display: block; }
  .panel h3 { font-size: 16px; margin-bottom: 2px; }
  .panel .role-tag {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 8px;
    font-size: 10px;
    background: var(--c);
    margin-bottom: 10px;
  }
  .panel p { font-size: 12px; opacity: 0.75; line-height: 1.5; }

  .bottom-bar {
    position: absolute;
    bottom: 20px;
    left: 20px;
    padding: 10px 18px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    font-size: 11px;
    opacity: 0.7;
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>🎮 Pipeline Crew — Three.js Edition</h1>
    <div class="sub">Procedural 3D avatars. Click any character. Drag to orbit the camera.</div>
  </div>
  <button class="demo-btn" onclick="runDemo()">▶ Run Demo</button>
</header>

<canvas id="stage"></canvas>

<div class="bottom-bar">Drag to orbit · Scroll to zoom · Click a character to select</div>

<div class="panel" id="panel">
  <h3 id="p-name"></h3>
  <div class="role-tag" id="p-role"></div>
  <p id="p-desc"></p>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const CHARS = [
  { id: 'pip',     name: 'Pip',     role: 'Product Owner',      color: 0xF5A623, desc: 'Turns ideas into clear requirements.' },
  { id: 'archie',  name: 'Archie',  role: 'Solution Architect', color: 0x3B82F6, desc: 'Sees the whole system at once.' },
  { id: 'yara',    name: 'Yara',    role: 'Spec Editor',        color: 0x10B981, desc: 'Keeper of the contract.' },
  { id: 'bruno',   name: 'Bruno',   role: 'Backend',            color: 0xD97706, desc: 'Builds the engine.' },
  { id: 'pixel',   name: 'Pixel',   role: 'Frontend',           color: 0x8B5CF6, desc: 'Disciplined creative energy.' },
  { id: 'mira',    name: 'Mira',    role: 'UX Consultant',      color: 0xEC4899, desc: 'Matches the actual design system.' },
  { id: 'echo',    name: 'Echo',    role: 'Mock',               color: 0x22C55E, desc: 'Mirrors the backend perfectly.' },
  { id: 'stratos', name: 'Stratos', role: 'Infra',              color: 0x06B6D4, desc: 'Lives in the clouds.' },
  { id: 'crit',    name: 'Crit',    role: 'Reviewer',           color: 0xEF4444, desc: 'Reads every line.' },
  { id: 'judge',   name: 'Judge',   role: 'Assessor',           color: 0x7C3AED, desc: 'Cross-repo final word.' },
];

const canvas = document.getElementById('stage');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0d15);
scene.fog = new THREE.Fog(0x0a0d15, 15, 45);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 4, 16);

const controls = new OrbitControls(camera, canvas);
controls.target.set(0, 1.5, 0);
controls.enableDamping = true;
controls.minDistance = 8;
controls.maxDistance = 30;
controls.maxPolarAngle = Math.PI / 2 - 0.1;

// ground
const groundGeo = new THREE.CircleGeometry(20, 48);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a1d28, roughness: 0.8 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// grid
const grid = new THREE.GridHelper(30, 30, 0x2a3040, 0x1a1d28);
grid.position.y = 0.001;
scene.add(grid);

// lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.35));
const keyLight = new THREE.DirectionalLight(0xffffff, 1.0);
keyLight.position.set(8, 12, 6);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.left = -15; keyLight.shadow.camera.right = 15;
keyLight.shadow.camera.top = 15;  keyLight.shadow.camera.bottom = -15;
scene.add(keyLight);
const rimLight = new THREE.DirectionalLight(0x88ccff, 0.4);
rimLight.position.set(-6, 4, -4);
scene.add(rimLight);

// build a character: capsule body, sphere head, accent stripe
function buildCharacter(char, position) {
  const group = new THREE.Group();
  group.position.copy(position);
  group.userData = { char, baseY: position.y, state: 'idle' };

  // body (capsule)
  const bodyMat = new THREE.MeshStandardMaterial({ color: char.color, roughness: 0.5, metalness: 0.15 });
  const bodyGeo = new THREE.CapsuleGeometry(0.6, 1.1, 8, 16);
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 1.0;
  body.castShadow = true;
  group.add(body);

  // accent belt
  const beltMat = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.4 });
  const belt = new THREE.Mesh(new THREE.CylinderGeometry(0.62, 0.62, 0.1, 16), beltMat);
  belt.position.y = 0.75;
  group.add(belt);

  // head (sphere)
  const headMat = new THREE.MeshStandardMaterial({ color: 0xFFD4A3, roughness: 0.55 });
  const headGeo = new THREE.SphereGeometry(0.55, 24, 24);
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 2.2;
  head.castShadow = true;
  group.add(head);

  // eyes
  const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
  const eyeGeo = new THREE.SphereGeometry(0.06, 10, 10);
  const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
  const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
  eyeL.position.set(-0.18, 2.22, 0.5);
  eyeR.position.set(0.18, 2.22, 0.5);
  group.add(eyeL, eyeR);

  // hat / top marker (unique color accent on head)
  const hatMat = new THREE.MeshStandardMaterial({ color: char.color, roughness: 0.5 });
  const hat = new THREE.Mesh(new THREE.ConeGeometry(0.35, 0.45, 16), hatMat);
  hat.position.y = 2.85;
  hat.castShadow = true;
  group.add(hat);
  const hatBrim = new THREE.Mesh(new THREE.TorusGeometry(0.45, 0.04, 8, 20), hatMat);
  hatBrim.position.y = 2.66;
  hatBrim.rotation.x = Math.PI / 2;
  group.add(hatBrim);

  // feet
  const footMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.8 });
  const footGeo = new THREE.BoxGeometry(0.3, 0.12, 0.5);
  const footL = new THREE.Mesh(footGeo, footMat);
  const footR = new THREE.Mesh(footGeo, footMat);
  footL.position.set(-0.25, 0.06, 0.15);
  footR.position.set(0.25, 0.06, 0.15);
  footL.castShadow = true; footR.castShadow = true;
  group.add(footL, footR);

  // status indicator (floating ring above head)
  const ringMat = new THREE.MeshBasicMaterial({ color: 0xfbbf24, transparent: true, opacity: 0 });
  const ring = new THREE.Mesh(new THREE.TorusGeometry(0.35, 0.05, 8, 24), ringMat);
  ring.position.y = 3.4;
  ring.rotation.x = Math.PI / 2;
  group.add(ring);
  group.userData.ring = ring;

  scene.add(group);
  return group;
}

// arrange in a semicircle
const characterObjects = {};
const radius = 6;
CHARS.forEach((c, i) => {
  const angle = Math.PI - (Math.PI / (CHARS.length - 1)) * i;
  const x = Math.cos(angle) * radius;
  const z = -Math.sin(angle) * radius + 3;
  const pos = new THREE.Vector3(x, 0, z);
  const obj = buildCharacter(c, pos);
  obj.lookAt(0, 1.5, 8);
  characterObjects[c.id] = obj;
});

// raycaster for clicks
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
canvas.addEventListener('click', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(scene.children, true);
  if (intersects.length === 0) return;
  let obj = intersects[0].object;
  while (obj.parent && !obj.userData.char) obj = obj.parent;
  if (obj.userData.char) {
    const char = obj.userData.char;
    document.getElementById('panel').classList.add('visible');
    document.getElementById('p-name').textContent = char.name;
    const roleTag = document.getElementById('p-role');
    roleTag.textContent = char.role;
    roleTag.style.setProperty('--c', '#' + char.color.toString(16).padStart(6, '0'));
    document.getElementById('p-desc').textContent = char.desc;
  }
});

// state controls
function setState(id, state) {
  const obj = characterObjects[id];
  if (!obj) return;
  obj.userData.state = state || 'idle';
  const ring = obj.userData.ring;
  if (state === 'working') {
    ring.material.color.setHex(0xfbbf24);
    ring.material.opacity = 1;
  } else if (state === 'done') {
    ring.material.color.setHex(0x22c55e);
    ring.material.opacity = 1;
  } else {
    ring.material.opacity = 0;
  }
}

// demo
window.runDemo = async function() {
  const seq = ['pip','archie','yara','bruno','echo','stratos','mira','pixel','crit','judge'];
  seq.forEach(id => setState(id, 'idle'));
  for (const id of seq) {
    setState(id, 'working');
    await new Promise(r => setTimeout(r, 700));
    setState(id, 'done');
    await new Promise(r => setTimeout(r, 200));
  }
};

// animate
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  Object.values(characterObjects).forEach((obj, i) => {
    const state = obj.userData.state;
    const phase = t * 2 + i * 0.3;
    if (state === 'working') {
      obj.position.y = obj.userData.baseY + Math.abs(Math.sin(phase * 3)) * 0.2;
      obj.rotation.y += 0.02;
    } else if (state === 'done') {
      obj.position.y = obj.userData.baseY + Math.abs(Math.sin(phase * 1.5)) * 0.15;
    } else {
      obj.position.y = obj.userData.baseY + Math.sin(phase) * 0.05;
    }
    // status ring spins
    if (obj.userData.ring.material.opacity > 0) {
      obj.userData.ring.rotation.z += 0.05;
    }
  });

  controls.update();
  renderer.render(scene, camera);
}
animate();

// resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
